evaluation:
  protocol_id: protocol_v1_cross_domain
  domains: both
  metrics:
    finqa: [exact_match, numeric_accuracy]
    failure: [accuracy, f1_macro]
  numeric_tolerance:
    absolute: 0.001
    relative: 0.001
  generation:
    max_new_tokens: 32
    max_input_length: 4096
    batch_size: 8
    temperature: 0.0
    top_p: 0.9
    top_k: 50
    do_sample: false
    repetition_penalty: 1.0
  save_predictions: true
  save_error_analysis_sample: 30
paths:
  test_data_path: data/processed/hybrid_v1/test.jsonl
